<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SRMS</title>
  <meta name="description" content="Student dashboard — overview of resources, notifications, and activity." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon">S</div>
      <span>SRMS</span>
    </div>
    <nav class="sidebar-nav">
      <span class="sidebar-section-label">Menu</span>
      <a class="nav-item active" href="dashboard.html">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a class="nav-item" href="resources.html">
        <span class="nav-icon">📚</span> Resources
      </a>
      <a class="nav-item" href="upload.html">
        <span class="nav-icon">⬆️</span> Upload
      </a>
      <a class="nav-item" href="profile.html">
        <span class="nav-icon">👤</span> Profile
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">–</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Loading…</div>
          <div class="user-role" id="sidebar-role"></div>
        </div>
        <button class="logout-btn" title="Logout" onclick="logout()">⎋</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <h1>Dashboard</h1>
        <p id="welcome-msg">Welcome back!</p>
      </div>
      <div class="topbar-actions">
        <a href="upload.html" class="btn btn-primary btn-sm">+ Upload Resource</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-label">Total Resources</div>
        <div class="stat-value" id="stat-resources">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⬆️</div>
        <div class="stat-label">My Uploads</div>
        <div class="stat-value" id="stat-uploads">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔔</div>
        <div class="stat-label">Unread Notifications</div>
        <div class="stat-value" id="stat-notifs">—</div>
      </div>
    </div>

    <!-- Content grid -->
    <div class="grid-2">

      <!-- Recent Resources -->
      <div class="card">
        <div class="card-header">
          <h2>Recently Added</h2>
          <a href="resources.html" style="font-size:.82rem;">View all →</a>
        </div>
        <div class="card-body" id="recent-resources">
          <div class="loading-row"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Notifications -->
      <div class="card">
        <div class="card-header">
          <h2>Notifications</h2>
        </div>
        <div class="card-body" id="notif-list">
          <div class="loading-row"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
