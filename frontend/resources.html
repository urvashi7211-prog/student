<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources — SRMS</title>
  <meta name="description" content="Browse, search and filter study resources by subject, semester, and category." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon">S</div><span>SRMS</span>
    </div>
    <nav class="sidebar-nav">
      <span class="sidebar-section-label">Menu</span>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-item active" href="resources.html"><span class="nav-icon">📚</span> Resources</a>
      <a class="nav-item" href="upload.html"><span class="nav-icon">⬆️</span> Upload</a>
      <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">–</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Loading…</div>
          <div class="user-role" id="sidebar-role"></div>
        </div>
        <button class="logout-btn" title="Logout" onclick="logout()">⎋</button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">
        <h1>Resources</h1>
        <p>Browse and download study materials</p>
      </div>
      <div class="topbar-actions">
        <a href="upload.html" class="btn btn-primary btn-sm">+ Upload</a>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-strip">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="search" placeholder="Search resources…" oninput="debouncedSearch()" />
      </div>
      <select id="filter-subject" onchange="applyFilters()">
        <option value="">All Subjects</option>
        <option>Mathematics</option><option>Physics</option>
        <option>Chemistry</option><option>Computer Science</option>
        <option>Data Structures</option><option>DBMS</option>
        <option>Operating Systems</option><option>Networks</option>
        <option>Software Engineering</option>
      </select>
      <select id="filter-semester" onchange="applyFilters()">
        <option value="">All Semesters</option>
        <option value="1">Sem 1</option><option value="2">Sem 2</option>
        <option value="3">Sem 3</option><option value="4">Sem 4</option>
        <option value="5">Sem 5</option><option value="6">Sem 6</option>
        <option value="7">Sem 7</option><option value="8">Sem 8</option>
      </select>
      <select id="filter-category" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option value="notes">Notes</option>
        <option value="assignment">Assignment</option>
        <option value="syllabus">Syllabus</option>
        <option value="question_paper">Question Paper</option>
        <option value="other">Other</option>
      </select>
      <select id="filter-type" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="pdf">PDF</option>
        <option value="video">Video</option>
        <option value="document">Document</option>
        <option value="other">Other</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="clearFilters()">Clear</button>
    </div>

    <!-- Resource Grid -->
    <div id="resource-grid" class="resource-grid">
      <div class="loading-row" style="grid-column:1/-1;"><div class="spinner"></div></div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- Resource Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Resource Detail</h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      <a id="modal-download-btn" class="btn btn-primary" href="#" target="_blank">⬇ Download</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/resources.js"></script>
</body>
</html>
