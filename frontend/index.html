<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRMS — Login / Sign Up</title>
  <meta name="description" content="Student Resource Management System — login or create your account." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">S</div>
      <span>SRMS</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Login</button>
      <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="auth-alert"></div>

    <!-- Login Form -->
    <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="login-btn" type="submit">Login</button>
    </form>

    <!-- Sign Up Form -->
    <form class="auth-form hidden" id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input id="signup-name" type="text" placeholder="Urvashi Singh" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="signup-course">Course</label>
          <input id="signup-course" type="text" placeholder="B.Tech CSE" />
        </div>
        <div class="form-group">
          <label for="signup-semester">Semester</label>
          <select id="signup-semester">
            <option value="1">1st</option><option value="2">2nd</option>
            <option value="3">3rd</option><option value="4">4th</option>
            <option value="5">5th</option><option value="6">6th</option>
            <option value="7">7th</option><option value="8">8th</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
        <span class="field-hint">At least 6 characters</span>
      </div>
      <button class="btn btn-primary" id="signup-btn" type="submit">Create Account</button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
